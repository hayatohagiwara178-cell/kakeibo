<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>家計簿アプリ</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f7fa; --card: #ffffff;
  --primary: #4f46e5; --primary-light: #e0e7ff;
  --income: #10b981; --expense: #ef4444;
  --fixed: #6366f1; --variable: #f59e0b;
  --savings: #0ea5e9;
  --text: #1f2937; --subtext: #6b7280;
  --border: #e5e7eb; --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }

.header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 20px 16px 16px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 700; }
.header-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }

.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: white; border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 10px; cursor: pointer; font-size: 10px; color: var(--subtext); border: none; background: none; transition: color 0.2s; }
.nav-item.active { color: var(--primary); }
.nav-item .icon { font-size: 22px; margin-bottom: 2px; }

.page { display: none; padding: 16px; }
.page.active { display: block; }

.card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-title { font-size: 12px; color: var(--subtext); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* Home summary grid */
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.summary-card { background: var(--card); border-radius: 14px; padding: 14px; box-shadow: var(--shadow); }
.summary-card.full { grid-column: 1 / -1; }
.summary-label { font-size: 11px; color: var(--subtext); margin-bottom: 4px; font-weight: 600; }
.summary-amount { font-size: 20px; font-weight: 800; }
.summary-amount.income { color: var(--income); }
.summary-amount.expense { color: var(--expense); }
.summary-amount.savings { color: var(--savings); }
.summary-amount.balance-pos { color: var(--primary); }
.summary-amount.balance-neg { color: var(--expense); }
.summary-amount.total-savings { color: var(--savings); }
.summary-icon { font-size: 22px; margin-bottom: 6px; }

/* Progress */
.progress-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.progress-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
.progress-fill.ok { background: var(--income); }
.progress-fill.warn { background: var(--variable); }
.progress-fill.over { background: var(--expense); }

/* Transaction */
.tx-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.tx-item:last-child { border-bottom: none; }
.tx-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 14px; font-weight: 600; }
.tx-sub { font-size: 11px; color: var(--subtext); }
.tx-amount { font-size: 15px; font-weight: 700; }
.tx-amount.income { color: var(--income); }
.tx-amount.expense { color: var(--expense); }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--subtext); margin-bottom: 4px; display: block; font-weight: 600; }
.form-input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 15px; outline: none; transition: border-color 0.2s; background: white; -webkit-appearance: none; }
.form-input:focus { border-color: var(--primary); }
.toggle-row { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
.toggle-btn { flex: 1; padding: 10px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; background: white; transition: all 0.2s; }

/* Category grid */
.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.cat-pick { display: flex; flex-direction: column; align-items: center; padding: 8px 4px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; background: var(--bg); transition: all 0.2s; }
.cat-pick.selected { border-color: var(--primary); background: var(--primary-light); }
.cat-pick-icon { font-size: 22px; }
.cat-pick-name { font-size: 10px; margin-top: 4px; text-align: center; line-height: 1.2; }

.btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--primary); color: white; }
.btn-danger { background: var(--expense); color: white; }

/* Calendar */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 12px; font-size: 18px; cursor: pointer; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 11px; color: var(--subtext); padding: 4px 0; font-weight: 600; }
.cal-day { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 2px; transition: transform 0.1s; }
.cal-day:active { transform: scale(0.9); }
.cal-day-num { font-size: 12px; font-weight: 600; }
.cal-day-amt { font-size: 8px; }
.cal-day.today { outline: 2px solid var(--primary); }
.cal-day.selected { outline: 2px solid #7c3aed; }
.heat-0 { background: #f3f4f6; } .heat-1 { background: #bfdbfe; } .heat-2 { background: #93c5fd; }
.heat-3 { background: #60a5fa; } .heat-4 { background: #f97316; color: white; } .heat-5 { background: #ef4444; color: white; }

/* Chart */
.chart-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 100px; margin-bottom: 8px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.bar-label { font-size: 9px; color: var(--subtext); }

/* Settings */
.settings-cat-item { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.settings-cat-item:last-child { border-bottom: none; }
.cat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.cat-info { flex: 1; min-width: 0; }
.cat-name { font-size: 13px; font-weight: 600; }
.cat-sub { font-size: 11px; color: var(--subtext); }
.badge { font-size: 10px; padding: 2px 6px; border-radius: 99px; font-weight: 600; }
.badge-fixed { background: #e0e7ff; color: var(--fixed); }
.badge-variable { background: #fef3c7; color: #d97706; }
.badge-income { background: #d1fae5; color: #065f46; }

/* Sort buttons */
.sort-btns { display: flex; flex-direction: column; gap: 2px; }
.sort-btn { background: none; border: 1px solid var(--border); border-radius: 4px; width: 24px; height: 20px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; color: var(--subtext); }
.sort-btn:disabled { opacity: 0.3; cursor: default; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: white; width: 100%; max-width: 430px; margin: 0 auto; border-radius: 20px 20px 0 0; padding: 20px 16px 30px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.close-btn { font-size: 24px; cursor: pointer; color: var(--subtext); border: none; background: none; }

/* Icon/Color picker */
.icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.icon-pick { font-size: 22px; padding: 6px; border-radius: 8px; text-align: center; cursor: pointer; border: 2px solid transparent; background: var(--bg); }
.icon-pick.selected { border-color: var(--primary); background: var(--primary-light); }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; }
.color-pick { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
.color-pick.selected { border-color: #1f2937; }

/* Misc */
.alert { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 10px; padding: 10px 12px; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.alert.danger { background: #fee2e2; border-color: #fca5a5; }
.type-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
.type-tab { padding: 6px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); cursor: pointer; background: white; }
.type-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
.section-title { font-size: 13px; font-weight: 700; color: var(--subtext); margin: 14px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.empty { text-align: center; color: var(--subtext); font-size: 14px; padding: 20px 0; }
.month-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
.stat-item { background: var(--bg); border-radius: 10px; padding: 10px 6px; }
.stat-val { font-size: 15px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--subtext); margin-top: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1 id="pageTitle">🏠 ホーム</h1>
  <div class="header-sub" id="headerSub"></div>
</div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-icon">💰</div>
      <div class="summary-label">今月の収入</div>
      <div class="summary-amount income" id="h-income">¥0</div>
    </div>
    <div class="summary-card">
      <div class="summary-icon">💸</div>
      <div class="summary-label">今月の支出</div>
      <div class="summary-amount expense" id="h-expense">¥0</div>
    </div>
    <div class="summary-card">
      <div class="summary-icon">🏦</div>
      <div class="summary-label">今月の貯蓄</div>
      <div class="summary-amount savings" id="h-savings">¥0</div>
    </div>
    <div class="summary-card">
      <div class="summary-icon">📊</div>
      <div class="summary-label">今月の収支</div>
      <div class="summary-amount balance-pos" id="h-balance">¥0</div>
    </div>
    <div class="summary-card full">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:28px">🪙</div>
        <div>
          <div class="summary-label">今までの貯蓄総額</div>
          <div class="summary-amount total-savings" id="h-total-savings">¥0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card" id="h-budget-fixed-card">
    <div class="card-title">🔒 固定費 予算</div>
    <div id="h-budget-fixed-content"></div>
  </div>

  <div class="card" id="h-budget-var-card">
    <div class="card-title">📊 変動費 予算</div>
    <div id="h-budget-var-content"></div>
  </div>

  <div class="card">
    <div class="card-title">最近の記録</div>
    <div id="h-recent"></div>
  </div>
</div>

<!-- RECORD -->
<div class="page" id="page-record">
  <div class="card">
    <div class="toggle-row">
      <button class="toggle-btn expense active" id="btn-expense" onclick="setType('expense')">💸 支出</button>
      <button class="toggle-btn income" id="btn-income" onclick="setType('income')">💰 収入</button>
    </div>
    <div class="form-group">
      <label class="form-label">金額</label>
      <input type="number" class="form-input" id="r-amount" placeholder="0" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" class="form-input" id="r-date">
    </div>
    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <input type="text" class="form-input" id="r-memo" placeholder="例: スーパーで買い物">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <div class="section-title" id="r-fixed-section">🔒 固定費</div>
      <div class="cat-grid" id="r-cat-fixed"></div>
      <div class="section-title" id="r-var-section">📊 変動費</div>
      <div class="cat-grid" id="r-cat-variable"></div>
    </div>
    <button class="btn btn-primary" onclick="addTransaction()">✅ 記録する</button>
  </div>
  <div class="card">
    <div class="card-title">最近の記録</div>
    <div id="r-recent"></div>
  </div>
</div>

<!-- CALENDAR -->
<div class="page" id="page-calendar">
  <div class="card">
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <strong id="cal-month-label"></strong>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="cal-dow"></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="card" id="cal-detail" style="display:none">
    <div class="card-title" id="cal-detail-title"></div>
    <div id="cal-detail-content"></div>
  </div>
  <div class="card">
    <div class="card-title">月間サマリー</div>
    <div class="month-stats" id="cal-stats"></div>
  </div>
</div>

<!-- GRAPH -->
<div class="page" id="page-graph">
  <div class="card">
    <div class="type-tabs">
      <button class="type-tab active" onclick="setGraphTab('pie')">カテゴリ別</button>
      <button class="type-tab" onclick="setGraphTab('bar')">月別推移</button>
      <button class="type-tab" onclick="setGraphTab('fixvar')">固定/変動</button>
    </div>
    <div id="graph-content"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="card">
    <div class="card-title">毎月の貯蓄額設定</div>
    <div class="form-group" style="margin-bottom:8px">
      <input type="number" class="form-input" id="s-savings" placeholder="例: 30000" inputmode="numeric">
    </div>
    <button class="btn btn-primary" onclick="saveSavingsAmt()">💾 保存</button>
  </div>
  <div class="card">
    <div class="card-title">カテゴリ管理</div>
    <div id="settings-cats"></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="openAddCat()">＋ カテゴリを追加</button>
  </div>
  <div class="card">
    <div class="card-title">データ管理</div>
    <button class="btn" style="background:#fee2e2;color:#ef4444;margin-top:4px" onclick="clearData()">🗑️ すべてのデータを削除</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-item active" onclick="goPage('home',this)"><span class="icon">🏠</span>ホーム</button>
  <button class="nav-item" onclick="goPage('record',this)"><span class="icon">➕</span>記録</button>
  <button class="nav-item" onclick="goPage('calendar',this)"><span class="icon">📅</span>カレンダー</button>
  <button class="nav-item" onclick="goPage('graph',this)"><span class="icon">📊</span>グラフ</button>
  <button class="nav-item" onclick="goPage('settings',this)"><span class="icon">⚙️</span>設定</button>
</nav>

<!-- Category Modal -->
<div class="modal-overlay" id="modal-cat">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-cat-title">カテゴリ編集</span>
      <button class="close-btn" onclick="closeModal('modal-cat')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ名</label>
      <input class="form-input" id="mc-name" placeholder="例：食費">
    </div>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div class="icon-grid" id="mc-icons"></div>
    </div>
    <div class="form-group">
      <label class="form-label">カラー</label>
      <div class="color-row" id="mc-colors"></div>
    </div>
    <div class="form-group">
      <label class="form-label">種別</label>
      <div class="toggle-row">
        <button class="toggle-btn" id="mc-variable-btn" onclick="setMCType('variable')">📊 変動費</button>
        <button class="toggle-btn" id="mc-fixed-btn" onclick="setMCType('fixed')">🔒 固定費</button>
        <button class="toggle-btn" id="mc-income-btn" onclick="setMCType('income')">💰 収入</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">月間予算（円）</label>
      <input class="form-input" id="mc-budget" type="number" placeholder="0" inputmode="numeric">
    </div>
    <button class="btn btn-primary" onclick="saveCategory()">💾 保存</button>
    <button class="btn btn-danger" id="mc-delete-btn" style="margin-top:8px;display:none" onclick="deleteCategory()">🗑️ 削除</button>
  </div>
</div>

<script>
const ICONS = ['🍽️','🥡','☕','🍺','🍣','🛒','🚃','🚗','🏠','💡','📡','📦','🤖','▶️','💊','🏥','👔','👟','💄','🎮','🎬','🎵','📚','✈️','🏨','🐾','🎁','💝','📱','💻','🏋️','⚽','🎓','💼','🏦','📈','🔧','🛁','🧹','🌿','🎪','🥂','🎯','🎨','🧴','💈','🏊'];
const COLORS = ['#ef4444','#f97316','#f59e0b','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#ec4899','#64748b'];

const DEFAULT_CATS = [
  // 固定費
  {id:'c1', name:'家賃',                        icon:'🏠', color:'#6366f1', type:'fixed',    budget:80000, order:0},
  {id:'c2', name:'光熱費',                      icon:'💡', color:'#f97316', type:'fixed',    budget:15000, order:1},
  {id:'c3', name:'通信費',                      icon:'📡', color:'#3b82f6', type:'fixed',    budget:8000,  order:2},
  {id:'c4', name:'サブスク（YouTube）',         icon:'▶️', color:'#ef4444', type:'fixed',    budget:1280,  order:3},
  {id:'c5', name:'サブスク（Amazon）',          icon:'📦', color:'#f59e0b', type:'fixed',    budget:600,   order:4},
  {id:'c6', name:'Claude費',                    icon:'🤖', color:'#8b5cf6', type:'fixed',    budget:3000,  order:5},
  // 変動費
  {id:'c7', name:'食費',     icon:'🍽️', color:'#ef4444', type:'variable', budget:30000, order:0},
  {id:'c8', name:'軽食費',   icon:'☕',  color:'#f97316', type:'variable', budget:10000, order:1},
  {id:'c9', name:'交通費',   icon:'🚃',  color:'#06b6d4', type:'variable', budget:10000, order:2},
  {id:'c10',name:'交際費',   icon:'🥂',  color:'#ec4899', type:'variable', budget:15000, order:3},
  {id:'c11',name:'娯楽費',   icon:'🎬',  color:'#8b5cf6', type:'variable', budget:10000, order:4},
  {id:'c12',name:'被服費',   icon:'👔',  color:'#64748b', type:'variable', budget:10000, order:5},
  {id:'c13',name:'日用品費', icon:'🛒',  color:'#10b981', type:'variable', budget:5000,  order:6},
  {id:'c14',name:'通院費',   icon:'🏥',  color:'#10b981', type:'variable', budget:5000,  order:7},
  {id:'c15',name:'美容費',   icon:'💄',  color:'#ec4899', type:'variable', budget:5000,  order:8},
  {id:'c16',name:'施設費',   icon:'🏋️', color:'#3b82f6', type:'variable', budget:5000,  order:9},
  {id:'c17',name:'ゲーム費', icon:'🎮',  color:'#6366f1', type:'variable', budget:5000,  order:10},
  {id:'c18',name:'書籍費',   icon:'📚',  color:'#f59e0b', type:'variable', budget:3000,  order:11},
  // 収入
  {id:'c19',name:'給与',   icon:'💼', color:'#10b981', type:'income', budget:0, order:0},
  {id:'c20',name:'副収入', icon:'📈', color:'#3b82f6', type:'income', budget:0, order:1},
];

function load(k,d){ try{ return JSON.parse(localStorage.getItem(k))??d; }catch{return d;} }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

let cats    = load('kakeibo_cats', DEFAULT_CATS);
let txs     = load('kakeibo_txs', []);
let monthlySavings = load('kakeibo_savings_amt', 0);

let recordType='expense', selectedCat=null;
let calYear, calMonth, calSelected=null;
let graphTab='pie';
let editingCatId=null, mcType='variable', mcIcon='🍽️', mcColor=COLORS[0];

// ── Helpers ──
function fmt(n){ return '¥'+Math.abs(n).toLocaleString(); }
function getCat(id){ return cats.find(c=>c.id===id); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function ymStr(y,m){ return `${y}-${String(m+1).padStart(2,'0')}`; }
function sortedCats(type){ return cats.filter(c=>c.type===type).sort((a,b)=>(a.order??0)-(b.order??0)); }

function monthTxs(prefix){
  return txs.filter(t=>t.date.startsWith(prefix));
}
function thisMonthTxs(){
  const n=new Date();
  return monthTxs(ymStr(n.getFullYear(),n.getMonth()));
}

// ── Navigation ──
const pageTitles={home:'🏠 ホーム',record:'➕ 収支を記録',calendar:'📅 カレンダー',graph:'📊 グラフ',settings:'⚙️ 設定'};
function goPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el) el.classList.add('active');
  document.getElementById('pageTitle').textContent=pageTitles[id];
  const n=new Date();
  document.getElementById('headerSub').textContent=`${n.getFullYear()}年${n.getMonth()+1}月`;
  if(id==='home') renderHome();
  if(id==='record') renderRecord();
  if(id==='calendar') renderCalendar();
  if(id==='graph') renderGraph();
  if(id==='settings') renderSettings();
}

// ── HOME ──
function calcTotalSavings(){
  // 月ごとに 貯蓄額 + max(0, 収支) を合計
  const months = {};
  txs.forEach(t=>{
    const ym = t.date.slice(0,7);
    if(!months[ym]) months[ym]={income:0,expense:0};
    if(t.type==='income') months[ym].income+=t.amount;
    else months[ym].expense+=t.amount;
  });
  let total=0;
  Object.values(months).forEach(({income,expense})=>{
    const balance = income - monthlySavings - expense;
    total += monthlySavings + Math.max(0, balance);
  });
  // 今月分は月次貯蓄だけ保証（収支プラスなら上乗せ）
  return total;
}

function renderHome(){
  const mTxs=thisMonthTxs();
  const income  = mTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = mTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - monthlySavings - expense;
  const totalSavings = calcTotalSavings();

  document.getElementById('h-income').textContent = fmt(income);
  document.getElementById('h-expense').textContent = fmt(expense);
  document.getElementById('h-savings').textContent = fmt(monthlySavings);

  const balEl = document.getElementById('h-balance');
  balEl.textContent = (balance>=0?'+':'-')+fmt(balance);
  balEl.className = 'summary-amount ' + (balance>=0?'balance-pos':'balance-neg');

  document.getElementById('h-total-savings').textContent = fmt(totalSavings);

  renderBudgetSection('fixed', mTxs);
  renderBudgetSection('variable', mTxs);

  const recent=[...txs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const el=document.getElementById('h-recent');
  el.innerHTML=recent.length?recent.map(txItem).join(''):'<div class="empty">まだ記録がありません</div>';
}

function renderBudgetSection(type, mTxs){
  const typeCats=sortedCats(type).filter(c=>c.budget>0);
  const cardId = type==='fixed'?'h-budget-fixed-card':'h-budget-var-card';
  const contentId = type==='fixed'?'h-budget-fixed-content':'h-budget-var-content';
  const contentEl=document.getElementById(contentId);
  const cardEl=document.getElementById(cardId);
  cardEl.querySelectorAll('.alert').forEach(a=>a.remove());

  if(!typeCats.length){ contentEl.innerHTML='<div class="empty">予算未設定</div>'; return; }
  let html='';
  typeCats.forEach(cat=>{
    const spent=mTxs.filter(t=>t.type==='expense'&&t.catId===cat.id).reduce((s,t)=>s+t.amount,0);
    const pct=cat.budget?Math.min(spent/cat.budget*100,100):0;
    const cls=pct>=100?'over':pct>=80?'warn':'ok';
    if(pct>=80){
      const div=document.createElement('div');
      div.className='alert'+(pct>=100?' danger':'');
      div.innerHTML=`${pct>=100?'🚨':'⚠️'} ${cat.icon}${cat.name} 予算${pct>=100?'オーバー':'80%超え'}（${Math.round(pct)}%）`;
      cardEl.insertBefore(div,contentEl);
    }
    html+=`<div class="progress-label"><span>${cat.icon} ${cat.name}</span><span>${fmt(spent)} / ${fmt(cat.budget)}</span></div>
    <div class="progress-track"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>`;
  });
  contentEl.innerHTML=html;
}

function txItem(t){
  const cat=getCat(t.catId);
  const sign=t.type==='income'?'+':'-';
  return `<div class="tx-item">
    <div class="tx-icon" style="background:${cat?cat.color+'22':'#f3f4f6'}">${cat?cat.icon:'❓'}</div>
    <div class="tx-info">
      <div class="tx-name">${cat?cat.name:'不明'}</div>
      <div class="tx-sub">${t.date}${t.memo?' · '+t.memo:''}</div>
    </div>
    <div class="tx-amount ${t.type}">${sign}${fmt(t.amount)}</div>
  </div>`;
}

// ── RECORD ──
function renderRecord(){
  document.getElementById('r-date').value=todayStr();
  renderCatGrid();
  const recent=[...txs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const el=document.getElementById('r-recent');
  el.innerHTML=recent.length?recent.map(t=>{
    const cat=getCat(t.catId);
    const sign=t.type==='income'?'+':'-';
    return `<div class="tx-item">
      <div class="tx-icon" style="background:${cat?cat.color+'22':'#f3f4f6'}">${cat?cat.icon:'❓'}</div>
      <div class="tx-info"><div class="tx-name">${cat?cat.name:'不明'}</div><div class="tx-sub">${t.date}${t.memo?' · '+t.memo:''}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="tx-amount ${t.type}">${sign}${fmt(t.amount)}</div>
        <button onclick="deleteTx('${t.id}')" style="background:none;border:none;font-size:16px;cursor:pointer;color:#ef4444;">🗑</button>
      </div></div>`;
  }).join(''):'<div class="empty">まだ記録がありません</div>';
}

function renderCatGrid(){
  const fixedSection=document.getElementById('r-fixed-section');
  const varSection=document.getElementById('r-var-section');
  if(recordType==='income'){
    fixedSection.style.display='none';
    varSection.style.display='none';
    document.getElementById('r-cat-fixed').innerHTML='';
    document.getElementById('r-cat-variable').innerHTML=sortedCats('income').map(catPickHTML).join('');
  } else {
    fixedSection.style.display='';
    varSection.style.display='';
    document.getElementById('r-cat-fixed').innerHTML=sortedCats('fixed').map(catPickHTML).join('');
    document.getElementById('r-cat-variable').innerHTML=sortedCats('variable').map(catPickHTML).join('');
  }
}

function catPickHTML(c){
  return `<div class="cat-pick" id="cp-${c.id}" onclick="selectCat('${c.id}')">
    <div class="cat-pick-icon">${c.icon}</div>
    <div class="cat-pick-name">${c.name}</div>
  </div>`;
}

function selectCat(id){
  document.querySelectorAll('.cat-pick').forEach(el=>el.classList.remove('selected'));
  document.getElementById('cp-'+id)?.classList.add('selected');
  selectedCat=id;
}

function setType(type){
  recordType=type; selectedCat=null;
  document.getElementById('btn-expense').className='toggle-btn expense'+(type==='expense'?' active':'');
  document.getElementById('btn-income').className='toggle-btn income'+(type==='income'?' active':'');
  if(type==='expense'){ document.getElementById('btn-expense').style.cssText='background:var(--expense);color:white'; document.getElementById('btn-income').style.cssText=''; }
  else { document.getElementById('btn-income').style.cssText='background:var(--income);color:white'; document.getElementById('btn-expense').style.cssText=''; }
  renderCatGrid();
}

function addTransaction(){
  const amount=parseFloat(document.getElementById('r-amount').value);
  const date=document.getElementById('r-date').value;
  const memo=document.getElementById('r-memo').value.trim();
  if(!amount||amount<=0){alert('金額を入力してください');return;}
  if(!date){alert('日付を入力してください');return;}
  if(!selectedCat){alert('カテゴリを選択してください');return;}
  txs.push({id:Date.now().toString(),type:recordType,amount,date,catId:selectedCat,memo});
  save('kakeibo_txs',txs);
  document.getElementById('r-amount').value='';
  document.getElementById('r-memo').value='';
  selectedCat=null;
  document.querySelectorAll('.cat-pick').forEach(el=>el.classList.remove('selected'));
  renderRecord();
}

function deleteTx(id){
  if(!confirm('この記録を削除しますか？'))return;
  txs=txs.filter(t=>t.id!==id);
  save('kakeibo_txs',txs);
  renderRecord();
}

// ── CALENDAR ──
function initCal(){ const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); }

function renderCalendar(){
  if(!calYear)initCal();
  document.getElementById('cal-dow').innerHTML=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  document.getElementById('cal-month-label').textContent=`${calYear}年${calMonth+1}月`;
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const prefix=ymStr(calYear,calMonth);
  const mTxs=txs.filter(t=>t.date.startsWith(prefix));
  const dayTotals={};
  mTxs.filter(t=>t.type==='expense').forEach(t=>{
    const d=parseInt(t.date.slice(8));
    dayTotals[d]=(dayTotals[d]||0)+t.amount;
  });
  const maxDay=Math.max(...Object.values(dayTotals),1);
  const todayD=new Date().toISOString().slice(0,10);
  let html=Array(first).fill('<div></div>').join('');
  for(let d=1;d<=days;d++){
    const ds=`${prefix}-${String(d).padStart(2,'0')}`;
    const amt=dayTotals[d]||0;
    const heat=amt===0?0:Math.min(Math.ceil(amt/maxDay*5),5);
    const amtStr=amt?(amt>=10000?Math.round(amt/1000)+'k':amt):'';
    html+=`<div class="cal-day heat-${heat}${ds===todayD?' today':''}${ds===calSelected?' selected':''}" onclick="selectCalDay('${ds}')">
      <div class="cal-day-num">${d}</div><div class="cal-day-amt">${amtStr}</div></div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  const daysWithExp=Object.keys(dayTotals).length;
  const totalExp=Object.values(dayTotals).reduce((s,v)=>s+v,0);
  const maxEntry=Object.entries(dayTotals).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('cal-stats').innerHTML=`
    <div class="stat-item"><div class="stat-val">${daysWithExp}</div><div class="stat-lbl">支出日数</div></div>
    <div class="stat-item"><div class="stat-val">${totalExp&&daysWithExp?fmt(Math.round(totalExp/daysWithExp)):'-'}</div><div class="stat-lbl">1日平均</div></div>
    <div class="stat-item"><div class="stat-val">${maxEntry?maxEntry[0]+'日':'-'}</div><div class="stat-lbl">最大支出日</div></div>`;
  if(calSelected)showCalDetail(calSelected);
}

function selectCalDay(ds){ calSelected=calSelected===ds?null:ds; renderCalendar(); }
function showCalDetail(ds){
  const dayTxs=txs.filter(t=>t.date===ds);
  const d=new Date(ds+'T00:00:00');
  document.getElementById('cal-detail-title').textContent=`${d.getMonth()+1}月${d.getDate()}日の記録`;
  document.getElementById('cal-detail-content').innerHTML=dayTxs.length?dayTxs.map(txItem).join(''):'<div class="empty">記録なし</div>';
  document.getElementById('cal-detail').style.display='';
}
function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} calSelected=null; renderCalendar(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} calSelected=null; renderCalendar(); }

// ── GRAPH ──
function setGraphTab(tab){
  graphTab=tab;
  document.querySelectorAll('.type-tab').forEach((el,i)=>el.classList.toggle('active',['pie','bar','fixvar'][i]===tab));
  renderGraph();
}

function renderGraph(){
  const el=document.getElementById('graph-content');
  if(graphTab==='pie') el.innerHTML=renderPie();
  else if(graphTab==='bar') el.innerHTML=renderBar();
  else el.innerHTML=renderFixVar();
}

function renderPie(){
  const mTxs=thisMonthTxs().filter(t=>t.type==='expense');
  const totals={};
  mTxs.forEach(t=>{ totals[t.catId]=(totals[t.catId]||0)+t.amount; });
  const entries=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);
  if(!total)return'<div class="empty">今月の支出データがありません</div>';
  let startAngle=-Math.PI/2;
  const cx=100,cy=100,r=80,ir=40;
  let paths='',legend='';
  entries.forEach(([id,amt])=>{
    const cat=getCat(id); if(!cat)return;
    const pct=amt/total, angle=pct*2*Math.PI;
    const x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    const endA=startAngle+angle;
    const x2=cx+r*Math.cos(endA),y2=cy+r*Math.sin(endA);
    const xi1=cx+ir*Math.cos(startAngle),yi1=cy+ir*Math.sin(startAngle);
    const xi2=cx+ir*Math.cos(endA),yi2=cy+ir*Math.sin(endA);
    const large=angle>Math.PI?1:0;
    paths+=`<path d="M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ir},${ir} 0 ${large},0 ${xi1},${yi1}" fill="${cat.color}" opacity="0.9"/>`;
    legend+=`<div class="legend-item"><div class="legend-dot" style="background:${cat.color}"></div>${cat.icon}${cat.name} ${Math.round(pct*100)}%</div>`;
    startAngle=endA;
  });
  return `<div style="width:200px;height:200px;margin:0 auto 16px">
    <svg viewBox="0 0 200 200" width="200" height="200">${paths}
      <text x="100" y="96" text-anchor="middle" font-size="11" fill="#6b7280">合計</text>
      <text x="100" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2937">¥${total.toLocaleString()}</text>
    </svg></div><div class="chart-legend">${legend}</div>`;
}

function renderBar(){
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(new Date().getFullYear(),new Date().getMonth()-i,1);
    months.push({y:d.getFullYear(),m:d.getMonth(),label:`${d.getMonth()+1}月`});
  }
  const data=months.map(({y,m,label})=>{
    const prefix=ymStr(y,m);
    const mTxs=txs.filter(t=>t.date.startsWith(prefix));
    const income=mTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense=mTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    return{label,income,expense};
  });
  const maxVal=Math.max(...data.flatMap(d=>[d.income,d.expense]),1);
  const bars=data.map(d=>{
    const ih=Math.round(d.income/maxVal*90),eh=Math.round(d.expense/maxVal*90);
    return `<div class="bar-col">
      <div style="height:90px;display:flex;align-items:flex-end;gap:2px;width:100%">
        <div style="flex:1;height:${ih}px;background:var(--income);border-radius:3px 3px 0 0"></div>
        <div style="flex:1;height:${eh}px;background:var(--expense);border-radius:3px 3px 0 0"></div>
      </div><div class="bar-label">${d.label}</div></div>`;
  }).join('');
  return `<div class="bar-chart">${bars}</div>
    <div style="display:flex;gap:12px;font-size:12px">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--income);display:inline-block;border-radius:2px"></span>収入</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--expense);display:inline-block;border-radius:2px"></span>支出</span>
    </div>`;
}

function renderFixVar(){
  const mTxs=thisMonthTxs().filter(t=>t.type==='expense');
  const fixed=mTxs.filter(t=>{const c=getCat(t.catId);return c&&c.type==='fixed';}).reduce((s,t)=>s+t.amount,0);
  const variable=mTxs.filter(t=>{const c=getCat(t.catId);return c&&c.type==='variable';}).reduce((s,t)=>s+t.amount,0);
  const total=fixed+variable||1;
  const fp=Math.round(fixed/total*100),vp=100-fp;
  return `<div style="margin-bottom:16px">
    <div style="display:flex;height:24px;border-radius:12px;overflow:hidden">
      <div style="width:${fp}%;background:var(--fixed)"></div>
      <div style="width:${vp}%;background:var(--variable)"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-top:4px">
      <span style="color:var(--fixed)">🔒 固定費 ${fp}%</span>
      <span style="color:var(--variable)">📊 変動費 ${vp}%</span>
    </div></div>
  <div style="display:flex;gap:12px">
    <div class="stat-item" style="flex:1;background:#e0e7ff"><div class="stat-val" style="color:var(--fixed)">${fmt(fixed)}</div><div class="stat-lbl">固定費合計</div></div>
    <div class="stat-item" style="flex:1;background:#fef3c7"><div class="stat-val" style="color:var(--variable)">${fmt(variable)}</div><div class="stat-lbl">変動費合計</div></div>
  </div>`;
}

// ── SETTINGS ──
function saveSavingsAmt(){
  const v=parseFloat(document.getElementById('s-savings').value)||0;
  monthlySavings=v;
  save('kakeibo_savings_amt',v);
  alert(`毎月の貯蓄額を ${fmt(v)} に設定しました`);
}

function renderSettings(){
  document.getElementById('s-savings').value=monthlySavings||'';

  function catListHTML(type){
    const list=sortedCats(type);
    return list.map((c,i)=>`<div class="settings-cat-item">
      <div class="sort-btns">
        <button class="sort-btn" onclick="moveCat('${c.id}','${type}',-1)" ${i===0?'disabled':''}>▲</button>
        <button class="sort-btn" onclick="moveCat('${c.id}','${type}',1)" ${i===list.length-1?'disabled':''}>▼</button>
      </div>
      <div class="cat-icon" style="background:${c.color}22">${c.icon}</div>
      <div class="cat-info"><div class="cat-name">${c.name}</div><div class="cat-sub">${c.budget?'予算 '+fmt(c.budget):'予算未設定'}</div></div>
      <span class="badge badge-${c.type==='fixed'?'fixed':c.type==='income'?'income':'variable'}">${c.type==='fixed'?'固定':c.type==='income'?'収入':'変動'}</span>
      <button onclick="openEditCat('${c.id}')" style="background:none;border:none;font-size:18px;cursor:pointer">✏️</button>
    </div>`).join('');
  }

  document.getElementById('settings-cats').innerHTML=`
    <div class="section-title">🔒 固定費</div>${catListHTML('fixed')}
    <div class="section-title">📊 変動費</div>${catListHTML('variable')}
    <div class="section-title">💰 収入</div>${catListHTML('income')}`;
}

function moveCat(id,type,dir){
  const list=sortedCats(type);
  const idx=list.findIndex(c=>c.id===id);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=list.length)return;
  [list[idx].order,list[newIdx].order]=[list[newIdx].order,list[idx].order];
  // normalize orders
  sortedCats(type).forEach((c,i)=>{ c.order=i; });
  save('kakeibo_cats',cats);
  renderSettings();
}

// ── CATEGORY MODAL ──
function openAddCat(){
  editingCatId=null; mcType='variable'; mcIcon='🍽️'; mcColor=COLORS[0];
  document.getElementById('mc-name').value='';
  document.getElementById('mc-budget').value='';
  document.getElementById('modal-cat-title').textContent='カテゴリを追加';
  document.getElementById('mc-delete-btn').style.display='none';
  renderModalCat(); openModal('modal-cat');
}

function openEditCat(id){
  editingCatId=id;
  const c=getCat(id);
  mcType=c.type; mcIcon=c.icon; mcColor=c.color;
  document.getElementById('mc-name').value=c.name;
  document.getElementById('mc-budget').value=c.budget||'';
  document.getElementById('modal-cat-title').textContent='カテゴリを編集';
  document.getElementById('mc-delete-btn').style.display='';
  renderModalCat(); openModal('modal-cat');
}

function renderModalCat(){
  document.getElementById('mc-icons').innerHTML=ICONS.map(ic=>
    `<div class="icon-pick${ic===mcIcon?' selected':''}" onclick="selectMCIcon('${ic}')">${ic}</div>`
  ).join('');
  document.getElementById('mc-colors').innerHTML=COLORS.map(c=>
    `<div class="color-pick${c===mcColor?' selected':''}" style="background:${c}" onclick="selectMCColor('${c}')"></div>`
  ).join('');
  updateMCTypeBtns();
}
function selectMCIcon(ic){ mcIcon=ic; renderModalCat(); }
function selectMCColor(c){ mcColor=c; renderModalCat(); }
function setMCType(t){ mcType=t; updateMCTypeBtns(); }
function updateMCTypeBtns(){
  const btns={variable:document.getElementById('mc-variable-btn'),fixed:document.getElementById('mc-fixed-btn'),income:document.getElementById('mc-income-btn')};
  const colors={variable:'var(--variable)',fixed:'var(--fixed)',income:'var(--income)'};
  Object.entries(btns).forEach(([k,b])=>{
    b.style.cssText=mcType===k?`background:${colors[k]};color:white`:'background:white;color:var(--text)';
  });
}

function saveCategory(){
  const name=document.getElementById('mc-name').value.trim();
  const budget=parseFloat(document.getElementById('mc-budget').value)||0;
  if(!name){alert('カテゴリ名を入力してください');return;}
  if(editingCatId){
    const c=getCat(editingCatId);
    c.name=name; c.icon=mcIcon; c.color=mcColor; c.type=mcType; c.budget=budget;
  } else {
    const maxOrder=Math.max(...cats.filter(c=>c.type===mcType).map(c=>c.order??0),0);
    cats.push({id:'c'+Date.now(),name,icon:mcIcon,color:mcColor,type:mcType,budget,order:maxOrder+1});
  }
  save('kakeibo_cats',cats);
  closeModal('modal-cat'); renderSettings();
}

function deleteCategory(){
  if(!editingCatId)return;
  if(!confirm('このカテゴリを削除しますか？'))return;
  cats=cats.filter(c=>c.id!==editingCatId);
  save('kakeibo_cats',cats);
  closeModal('modal-cat'); renderSettings();
}

function clearData(){
  if(!confirm('すべての記録とカテゴリを削除しますか？\nこの操作は元に戻せません。'))return;
  txs=[]; cats=JSON.parse(JSON.stringify(DEFAULT_CATS)); monthlySavings=0;
  save('kakeibo_txs',txs); save('kakeibo_cats',cats); save('kakeibo_savings_amt',0);
  renderHome();
}

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ── Init ──
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
setType('expense');
renderHome();
const _n=new Date();
document.getElementById('headerSub').textContent=`${_n.getFullYear()}年${_n.getMonth()+1}月`;
</script>
